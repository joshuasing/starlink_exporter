# GitHub Actions workflow to run OpenSSF Scorecard analysis.
name: "Scorecard"
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "30 2 * * 1"

concurrency:
  group: "scorecard-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analysis:
    name: "Scorecard Analysis"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      security-events: write # Required to upload SARIF output.
      id-token: write # Required for auth when publishing OpenSSF scorecard.
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Run Scorecard"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: "results.sarif"
          results_format: "sarif"
          publish_results: true

      - name: "Upload results to code-scanning"
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "results.sarif"

      - name: "Upload results as artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "scorecard-results"
          path: "results.sarif"
          retention-days: 5
